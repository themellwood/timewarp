<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Time Warp</title>
<meta name="description" content="Capture how the last hour felt. See how time flowed for the world."/>
<meta name="theme-color" content="#050008"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Time Warp"/>
<link rel="manifest" href="manifest.webmanifest"/>
<link rel="icon" type="image/svg+xml" href="icons/icon.svg"/>
<link rel="apple-touch-icon" href="icons/icon.svg"/>
<link rel="stylesheet" href="styles.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div class="stage-bg"></div>
<div id="root"></div>

<!-- Backend endpoints. api.js falls back to sample data if these are
     unreachable, so the UI is resilient to the Worker being down. -->
<script>
  window.TW_API_BASE  = 'https://timewarp-api.perky.workers.dev';
  window.TW_DATA_BASE = 'https://pub-9dffd6c49ad244ce8893f12cdc193bdf.r2.dev';
</script>

<!-- device profile, API client, local notification scheduler: classic scripts, attach helpers to window -->
<script src="profile.js"></script>
<script src="api.js"></script>
<script src="notifications.js"></script>

<!-- UI -->
<script type="text/babel" src="orb.jsx"></script>
<script type="text/babel" src="screens-1.jsx"></script>
<script type="text/babel" src="screens-2.jsx"></script>
<script type="text/babel" src="screens-3.jsx"></script>
<script type="text/babel" src="capture-variants.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAKS_KEY = 'tw_tweaks';
// Bump TWEAKS_VERSION whenever the default capture UI (or other default)
// changes so existing installs don't keep showing the old variant.
const TWEAKS_VERSION = 2;
const DEFAULT_TWEAKS = { version: TWEAKS_VERSION, material: 'plasma', sound: false, worldStyle: 'globe', capture: 'dial' };
function loadTweaks() {
  try {
    const stored = JSON.parse(localStorage.getItem(TWEAKS_KEY)) || {};
    if (stored.version !== TWEAKS_VERSION) return { ...DEFAULT_TWEAKS };
    return Object.assign({}, DEFAULT_TWEAKS, stored);
  } catch (e) { return { ...DEFAULT_TWEAKS }; }
}

const SCREENS = [
  { id: 'onboard',   label: 'Intro' },
  { id: 'capture',   label: 'Capture' },
  { id: 'world',     label: 'World' },
  { id: 'history',   label: 'Week' },
  { id: 'insights',  label: 'Cohort' },
];

const CAPTURE_VARIANTS = [
  { id: 'orb',      label: 'Orb · taffy' },
  { id: 'timeline', label: 'Elastic timeline' },
  { id: 'dial',     label: 'Dial · twist' },
  { id: 'squeeze',  label: 'Squeeze · press' },
  { id: 'draw',     label: 'Draw the hour' },
  { id: 'pinch',    label: 'Pinch · two thumbs' },
];

function pickInitialScreen() {
  // Respect deep-links (?start=capture via notification), then last session,
  // then: first-timers start in the intro; returning users go straight to capture.
  const hash = (window.location.hash || '').replace(/^#/, '');
  if (hash && SCREENS.some((s) => s.id === hash)) return hash;
  const stored = localStorage.getItem('tw_screen');
  if (stored && SCREENS.some((s) => s.id === stored)) return stored;
  return window.TWProfile && window.TWProfile.hasOnboarded() ? 'capture' : 'onboard';
}

function App() {
  const [screen, setScreen] = useState(pickInitialScreen);
  const [tweaks, setTweaks] = useState(loadTweaks);
  const [editMode, setEditMode] = useState(() => window.location.hash === '#tweaks');

  useEffect(() => { localStorage.setItem('tw_screen', screen); }, [screen]);
  useEffect(() => { localStorage.setItem(TWEAKS_KEY, JSON.stringify(tweaks)); }, [tweaks]);

  // Hash-based tweaks toggle — visit /#tweaks to surface the config panel.
  // Lets the user change orb material / world style / ambient hum without
  // a separate settings screen. Safe to ignore.
  useEffect(() => {
    const h = () => setEditMode(window.location.hash === '#tweaks');
    window.addEventListener('hashchange', h);
    return () => window.removeEventListener('hashchange', h);
  }, []);

  // Service worker posts `tw:route` when the user taps the daily notification.
  useEffect(() => {
    const fromSW = (e) => {
      if (e.data && e.data.type === 'tw:route') setScreen(e.data.route || 'capture');
    };
    navigator.serviceWorker?.addEventListener('message', fromSW);
    // Foreground fallback nudge from notifications.js also routes to capture.
    const fromForeground = () => setScreen('capture');
    window.addEventListener('tw:daily-ping', fromForeground);
    return () => {
      navigator.serviceWorker?.removeEventListener('message', fromSW);
      window.removeEventListener('tw:daily-ping', fromForeground);
    };
  }, []);

  const update = (k, v) => setTweaks((prev) => ({ ...prev, [k]: v }));

  // Sound: ambient hum via WebAudio
  useEffect(() => {
    if (!tweaks.sound) return;
    let ctx, osc1, osc2, gain;
    try {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      osc1 = ctx.createOscillator(); osc2 = ctx.createOscillator();
      gain = ctx.createGain();
      osc1.frequency.value = 110; osc2.frequency.value = 165;
      osc1.type = 'sine'; osc2.type = 'sine';
      gain.gain.value = 0.02;
      osc1.connect(gain); osc2.connect(gain); gain.connect(ctx.destination);
      osc1.start(); osc2.start();
    } catch(e) {}
    return () => { try { osc1?.stop(); osc2?.stop(); ctx?.close(); } catch(e){} };
  }, [tweaks.sound]);

  return (
    <>
      <OrbDefs/>
      <div className="app-root">
        {screen === 'onboard' && <Onboarding onDone={() => setScreen('capture')}/>}
        {screen === 'capture' && (() => {
          const common = {
            onSubmit: () => setScreen('world'),
            onOpenHistory: () => setScreen('history'),
            material: tweaks.material,
          };
          switch (tweaks.capture) {
            case 'timeline': return <CaptureTimeline {...common}/>;
            case 'dial':     return <CaptureDial {...common}/>;
            case 'squeeze':  return <CaptureSqueeze {...common}/>;
            case 'draw':     return <CaptureDraw {...common}/>;
            case 'pinch':    return <CapturePinch {...common}/>;
            default:         return <CaptureScreen {...common}/>;
          }
        })()}
        {screen === 'world' && <WorldScreen
          worldStyle={tweaks.worldStyle}
          onBack={() => setScreen('capture')}
          onCompare={() => setScreen('insights')}/>}
        {screen === 'history' && <HistoryScreen onBack={() => setScreen('capture')}/>}
        {screen === 'insights' && <InsightsScreen onBack={() => setScreen('capture')}/>}
      </div>

      {editMode && (
        <div className="tweaks-panel">
          <h4>◐ TWEAKS</h4>
          <div className="tweaks-row">
            <label>Capture UI</label>
            <div className="chip-row">
              {CAPTURE_VARIANTS.map(v => (
                <button key={v.id} className="chip"
                  data-active={tweaks.capture === v.id}
                  onClick={() => { update('capture', v.id); setScreen('capture'); }}>{v.label}</button>
              ))}
            </div>
          </div>
          <div className="tweaks-row">
            <label>Orb Material</label>
            <div className="chip-row">
              {['plasma','chrome','glass','liquid'].map(m => (
                <button key={m} className="chip"
                  data-active={tweaks.material === m}
                  onClick={() => update('material', m)}>{m}</button>
              ))}
            </div>
          </div>
          <div className="tweaks-row">
            <label>Ambient Hum</label>
            <div className="chip-row">
              <button className="chip" data-active={tweaks.sound} onClick={() => update('sound', true)}>on</button>
              <button className="chip" data-active={!tweaks.sound} onClick={() => update('sound', false)}>off</button>
            </div>
          </div>
          <div className="tweaks-row">
            <label>World View Style</label>
            <div className="chip-row">
              {['globe','particles','grid'].map(w => (
                <button key={w} className="chip"
                  data-active={tweaks.worldStyle === w}
                  onClick={() => update('worldStyle', w)}>{w}</button>
              ))}
            </div>
          </div>
          <div style={{
            marginTop: 12, paddingTop: 12,
            borderTop: '1px solid rgba(255,255,255,0.06)',
            fontFamily: 'var(--mono)', fontSize: 9,
            color: 'var(--ink-faint)', letterSpacing: '0.1em',
          }}>
            CLOSE ▸ REMOVE #tweaks FROM URL
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<!-- Service worker registration — only in browsers that support it and
     only when served over http(s). No-op during a `file://` open. -->
<script>
  if ('serviceWorker' in navigator && location.protocol !== 'file:') {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
