name = "timewarp-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Cron triggers:
#   0 * * * *   — hourly: refresh world/latest.json + cohorts/latest.json
#   5 0 * * *   — daily: dump previous UTC day as CSV to R2
#   */5 * * * * — every 5 minutes: fan out Web Push notifications to
#                 subscribers whose local time is inside their wake window.
[triggers]
crons = ["0 * * * *", "5 0 * * *", "*/5 * * * *"]

# D1 database for submissions.
# Create once:  wrangler d1 create timewarp_db
# then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "timewarp_db"
database_id = "082ee1ea-a1b5-45b0-a393-fe59def0e946"

# R2 bucket serving the public dataset.
# Create once:  wrangler r2 bucket create timewarp-public
# Then attach a custom domain (data.<your-domain>) in the dashboard, or use
# the `r2.dev` subdomain for testing.
[[r2_buckets]]
binding = "PUBLIC"
bucket_name = "timewarp-public"

[vars]
# The GitHub Pages (or custom) frontend origin. Used only for logging —
# CORS on the API is open ("*") because the data is public anyway.
FRONTEND_ORIGIN = "https://themellwood.github.io"
